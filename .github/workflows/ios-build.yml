name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Precache iOS Artifacts
        run: flutter precache --ios

      - name: Pod Install
        run: pod install --project-directory=ios

      - name: Generate Flutter iOS Config
        run: flutter build ios --config-only --release --no-codesign

      - name: Xcode Build Unsigned
        run: |
          set -e
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            build

      - name: Package Unsigned IPA
        run: |
          set -e
          APP_PATH="ios/build/Build/Products/Release-iphoneos/Runner.app"
          test -d "$APP_PATH" || { echo "Runner.app missing"; find ios/build -name '*.app'; exit 1; }
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr Runner-unsigned.ipa Payload
          mkdir -p build/ios/iphoneos
          mv Runner-unsigned.ipa build/ios/iphoneos/
          ls -lh build/ios/iphoneos/Runner-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app/build/ios/iphoneos/Runner-unsigned.ipa
          if-no-files-found: error
